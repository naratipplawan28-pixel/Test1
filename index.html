
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Season Simulation - แบบจำลองการเกิดฤดูกาล</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050510; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui-panel { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(20, 20, 30, 0.85); 
            padding: 20px; border-radius: 12px; 
            border: 1px solid #444; z-index: 10; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 320px;
        }
        h2 { margin-top: 0; font-size: 18px; color: #4da6ff; }
        input[type=range] { width: 100%; margin: 10px 0; }
        .info-box { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 6px; margin-top: 15px; }
        .season-highlight { font-weight: bold; color: #ffcc00; }
        .hint { font-size: 12px; color: #aaa; margin-top: 15px; line-height: 1.5; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; z-index: 0; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="loading">กำลังโหลดแบบจำลอง 3 มิติ...</div>
    
    <div id="ui-panel">
        <h2>🌍 Season Simulation</h2>
        
        <label for="daySlider">วันที่ในรอบปี (Day <span id="dayDisplay">1</span>/365)</label>
        <input type="range" id="daySlider" min="1" max="365" value="1">
        
        <button id="autoToggle" style="width:100%; padding: 8px; margin-top: 5px; cursor: pointer;">หยุดหมุนอัตโนมัติ</button>

        <div class="info-box">
            <strong>ตำแหน่งโลกปัจจุบัน:</strong><br>
            ซีกโลกเหนือ: <span id="northSeason" class="season-highlight">ฤดูหนาว</span><br>
            ซีกโลกใต้: <span id="southSeason" class="season-highlight">ฤดูร้อน</span>
        </div>

        <div class="hint">
            <strong>คำแนะนำ:</strong><br>
            🖱️ คลิกซ้ายค้าง + ลาก เพื่อหมุนมุมกล้อง<br>
            🖱️ เลื่อนลูกกลิ้งเมาส์ เพื่อซูมเข้า/ออก<br>
            * สังเกตเส้นสีแดง (แกนโลก) ที่เอียง 23.5° ว่าหันเข้าหรือออกจากดวงอาทิตย์
        </div>
    </div>

    <script>
        // ซ่อนข้อความโหลด
        document.getElementById('loading').style.display = 'none';

        // 1. ตั้งค่าฉาก (Scene) และกล้อง (Camera)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 90);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // ควบคุมมุมกล้อง
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;

        // 2. สร้างดวงอาทิตย์ (Sun)
        const sunGeometry = new THREE.SphereGeometry(6, 32, 32);
        const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sun);

        // แสงสว่างจากดวงอาทิตย์
        const sunLight = new THREE.PointLight(0xffffff, 2, 300);
        scene.add(sunLight);
        scene.add(new THREE.AmbientLight(0x222222)); // แสงแวดล้อมมืดๆ

        // 3. สร้างกลุ่มของโลก (เพื่อจัดการการโคจรและแกนเอียงแยกกัน)
        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        // สร้างโลก (Earth)
        const earthGeometry = new THREE.SphereGeometry(2.5, 32, 32);
        const earthMaterial = new THREE.MeshPhongMaterial({ 
            color: 0x2266ff, 
            emissive: 0x051530 
        });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        
        // ** หัวใจสำคัญ: ตั้งค่าแกนเอียง 23.5 องศา **
        const tiltAngle = 23.5 * Math.PI / 180;
        earth.rotation.z = tiltAngle; 
        earthGroup.add(earth);

        // สร้างเส้นแกนโลก (Axis Line) ให้เห็นชัดเจน
        const axisPoints = [new THREE.Vector3(0, -4.5, 0), new THREE.Vector3(0, 4.5, 0)];
        const axisGeometry = new THREE.BufferGeometry().setFromPoints(axisPoints);
        const axisMaterial = new THREE.LineBasicMaterial({ color: 0xff3333, linewidth: 2 });
        const axisLine = new THREE.Line(axisGeometry, axisMaterial);
        axisLine.rotation.z = tiltAngle;
        earthGroup.add(axisLine);

        // 4. สร้างเส้นทางการโคจร (Orbit Path)
        const orbitRadius = 45;
        const orbitCurve = new THREE.EllipseCurve(0, 0, orbitRadius, orbitRadius, 0, 2 * Math.PI, false, 0);
        const orbitPoints = orbitCurve.getPoints(100);
        const orbitGeometry = new THREE.BufferGeometry().setFromPoints(orbitPoints);
        const orbitMaterial = new THREE.LineBasicMaterial({ color: 0x444444 });
        const orbitLine = new THREE.Line(orbitGeometry, orbitMaterial);
        orbitLine.rotation.x = Math.PI / 2; // จับวางแนวนอน
        scene.add(orbitLine);

        // 5. ระบบควบคุม UI และเวลา
        const daySlider = document.getElementById('daySlider');
        const dayDisplay = document.getElementById('dayDisplay');
        const northSeasonText = document.getElementById('northSeason');
        const southSeasonText = document.getElementById('southSeason');
        const autoToggleBtn = document.getElementById('autoToggle');

        let currentDay = 1;
        let isAutoPlay = true;

        autoToggleBtn.addEventListener('click', () => {
            isAutoPlay = !isAutoPlay;
            autoToggleBtn.innerText = isAutoPlay ? "หยุดหมุนอัตโนมัติ" : "เล่นอัตโนมัติ";
        });

        daySlider.addEventListener('input', (e) => {
            isAutoPlay = false;
            autoToggleBtn.innerText = "เล่นอัตโนมัติ";
            currentDay = parseInt(e.target.value);
            updateEarthPosition();
        });

        function updateEarthPosition() {
            dayDisplay.innerText = Math.floor(currentDay);

            // คำนวณมุมโคจร: 1 ปี (365 วัน) = 360 องศา (2PI)
            // ปรับ offset ให้วันที่ 1 (เหมายัน) อยู่ด้านขวา โลกเอียงหนีดวงอาทิตย์
            const orbitAngle = ((currentDay - 1) / 365) * (Math.PI * 2);
            
            earthGroup.position.x = Math.cos(orbitAngle) * orbitRadius;
            earthGroup.position.z = Math.sin(orbitAngle) * orbitRadius;

            // อัปเดตข้อมูลฤดูกาลอย่างง่ายตามช่วงวัน
            if (currentDay >= 355 || currentDay < 80) {
                northSeasonText.innerText = "ฤดูหนาว (Winter Solstice)";
                southSeasonText.innerText = "ฤดูร้อน (Summer)";
            } else if (currentDay >= 80 && currentDay < 172) {
                northSeasonText.innerText = "ฤดูใบไม้ผลิ (Vernal Equinox)";
                southSeasonText.innerText = "ฤดูใบไม้ร่วง (Autumn)";
            } else if (currentDay >= 172 && currentDay < 264) {
                northSeasonText.innerText = "ฤดูร้อน (Summer Solstice)";
                southSeasonText.innerText = "ฤดูหนาว (Winter)";
            } else {
                northSeasonText.innerText = "ฤดูใบไม้ร่วง (Autumnal Equinox)";
                southSeasonText.innerText = "ฤดูใบไม้ผลิ (Spring)";
            }
        }

        // 6. ลูปการเคลื่อนไหว (Animation Loop)
        function animate() {
            requestAnimationFrame(animate);

            if (isAutoPlay) {
                currentDay += 0.3; // ความเร็วการโคจร
                if (currentDay > 365) currentDay = 1;
                daySlider.value = currentDay;
                updateEarthPosition();
            }

            // โลกหมุนรอบตัวเองเสมอ
            earth.rotation.y += 0.03;

            controls.update();
            renderer.render(scene, camera);
        }

        // เริ่มต้นการจำลอง
        updateEarthPosition();
        animate();

        // ปรับขนาดเมื่อย่อ/ขยายหน้าต่างเบราว์เซอร์
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
